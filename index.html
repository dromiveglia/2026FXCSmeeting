    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

        }

        .page-wrapper {

        }

            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

            font-size: 2rem;

            background: linear-gradient(135deg, #0b3b5f, #2c7da0);

            -webkit-background-clip: text;
            color: transparent;

        }

        .hero .subtitle {
            font-size: 1.1rem;
            color: #2c5282;
            font-weight: 500;
            border-left: 4px solid #3182ce;
            padding-left: 1rem;
            margin: 0.75rem 0;
        }

            flex-wrap: wrap;
            gap: 1.5rem;
            margin: 1.5rem 0;
            color: #2d3748;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef2ff;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        .info-item i {
            color: #2b6cb0;
            width: 1.4rem;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

            align-items: center;
            gap: 8px;
            padding: 0.75rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;

            text-decoration: none;

            margin-bottom: 0.5rem;

            margin-bottom: 1rem;

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            color: #0f3b5c;
        }

        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            color: #718096;
            background: none;
            border: none;
            line-height: 1;
        }

        .modal-body {
            font-size: 0.95rem;
            color: #2d3748;
        }

        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

            border: 1px solid #cbd5e0;
            padding: 8px 10px;
            text-align: left;

        }

            background: #eef2ff;
        }

            }

                padding: 1.2rem;
            }
            .card h4 {
                font-size: 1.1rem;
            }
        }

    };

    // 模块配置 (每个卡片独立跳转/弹窗信息)
    // type: 'modal' 展示模态框(内容从下方contentMap获取或自定义), 'link' 直接跳转外链
    // 报名参会卡片单独跳转问卷星, 照片直播跳转外链
    const MODULES = [
        { id: "confInfo", title: "会议信息", icon: "fas fa-info-circle", type: "modal", contentKey: "conferenceInfo" },
        { id: "org", title: "组织架构", icon: "fas fa-building", type: "modal", contentKey: "organization" },
        { id: "experts", title: "参会专家", icon: "fas fa-users", type: "modal", contentKey: "expertsList" },
        { id: "briefSchedule", title: "简要日程", icon: "fas fa-calendar-week", type: "modal", contentKey: "briefSchedule" },
        { id: "detailSchedule", title: "详细日程", icon: "fas fa-table-list", type: "modal", contentKey: "detailedSchedule" },
        { id: "register", title: "参会报名", icon: "fas fa-user-plus", type: "link", urlKey: "registrationUrl", desc: "填写问卷星报名" },
        { id: "regNotice", title: "注册须知", icon: "fas fa-clipboard-list", type: "modal", contentKey: "registrationNotice" },
        { id: "callPaper", title: "征文投稿", icon: "fas fa-file-alt", type: "modal", contentKey: "callForPapers" },
        { id: "subGuide", title: "投稿须知", icon: "fas fa-pen-ruler", type: "modal", contentKey: "submissionGuidelines" },
        { id: "photoLive", title: "照片直播", icon: "fas fa-camera", type: "link", urlKey: "photoLiveUrl", desc: "查看现场精彩瞬间" },
        { id: "support", title: "会议支持", icon: "fas fa-handshake", type: "modal", contentKey: "conferenceSupport" }
    ];

    // 内容映射：用于modal卡片展示的具体内容 (HTML字符串)
    function getModalContentById(key) {
        const cfg = MEETING_CONFIG;
        switch(key) {
            case "conferenceInfo":
                return `<p>${cfg.conferenceIntro}</p><br><strong>会议时间：</strong>${cfg.dates}<br><strong>地点：</strong>${cfg.location}<br><strong>主办单位：</strong>${cfg.organization.host}<br><strong>组织机构：</strong>${cfg.organization.organizations}<br>`;
            case "organization":
                return `<div><strong>指导单位：</strong>${cfg.organization.guidance}</div><br>
                        <div><strong>主办单位：</strong>${cfg.organization.host}</div><br>
                        <div><strong>承办单位：</strong>${cfg.organization.organizers}</div><br>
                        <div><strong>协办单位：</strong>${cfg.organization.co_organizers}</div><br>
                        <div><strong>主赞助单位：</strong>${cfg.organization.sponsor}</div>`;
            case "expertsList":
                let expertHtml = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">`;
                cfg.expertsList.forEach(exp => {
                    expertHtml += `<div style="background:#f1f5f9;border-radius:16px;padding:10px;"><i class="fas fa-user-circle"></i> <strong>${exp.name}</strong><br>${exp.title}<br><span style="font-size:0.8rem;">${exp.field}</span></div>`;
                });
                expertHtml += `</div><p style="margin-top:15px;">更多特邀嘉宾持续更新中，欢迎关注会议官网。</p>`;
                return expertHtml;
            case "briefSchedule":
                return `<p>${cfg.briefSchedule}</p><br><p>详细日程请点击「详细日程」卡片，以现场手册为准。</p>`;
            case "detailedSchedule":
                return `${cfg.detailedSchedule}<p class="mt-2" style="margin-top:12px;">※ 实际议程请以会议当天公布为准。</p>`;
            case "registrationNotice":
                return `<p>${cfg.registrationNotice}</p><br><a href="${cfg.registrationUrl}" target="_blank" class="btn btn-primary" style="display:inline-block;">前往问卷星报名</a>`;
            case "callForPapers":
                return `<p>${cfg.callForPapers}</p><br><i class="fas fa-envelope"></i> 投稿咨询：？<br>重要日期提醒：摘要截止2026年4月1日。`;
            case "submissionGuidelines":
                return `<p>${cfg.submissionGuidelines}</p><br><strong>模板下载：</strong> 大会官网提供Word/LaTex模板。`;
            case "conferenceSupport":
                return `<p>${cfg.conferenceSupport}</p><br><i class="fas fa-heart" style="color:#e53e3e;"></i> 诚挚感谢所有支持单位及志愿者团队！`;
            default:
                return "<p>信息更新中，敬请期待。</p>";
        }
    }

    // ======================== 页面动态渲染 ========================
    function setBackground() {
        const pageWrapper = document.querySelector('.page-wrapper');
        if (MEETING_CONFIG.backgroundImage && MEETING_CONFIG.backgroundImage.trim() !== "") {
            pageWrapper.style.backgroundImage = MEETING_CONFIG.backgroundImage;
            pageWrapper.style.backgroundSize = "cover";
            pageWrapper.style.backgroundAttachment = "fixed";
            pageWrapper.style.backgroundPosition = "center";
        } else {
            pageWrapper.style.background = "linear-gradient(135deg, #f8fafc 0%, #eef2f9 100%)";
        }
    }

    function renderHero() {
        const heroContainer = document.getElementById('heroContainer');
        heroContainer.innerHTML = `
            <div class="hero">
                <div class="hero-badge">${MEETING_CONFIG.shortTitle}</div>
                <h1>${MEETING_CONFIG.fullTitle}</h1>
                <div class="subtitle">2026湾区科学仪器与实验室科技产业合作促进活动</div>
                <div class="info-row">
                    <div class="info-item"><i class="far fa-calendar-alt"></i> ${MEETING_CONFIG.dates}</div>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> ${MEETING_CONFIG.location}</div>
                </div>
                <div class="btn-group">
                    <a class="btn btn-primary" id="heroRegBtn"><i class="fas fa-clipboard-list"></i> 立即报名</a>
                    <a class="btn btn-outline" id="heroPaperBtn"><i class="fas fa-file-signature"></i> 征文投稿</a>
                </div>
            </div>
        `;
        // 绑定头部按钮事件
        const regBtn = document.getElementById('heroRegBtn');
        if (regBtn) regBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.open(MEETING_CONFIG.registrationUrl, '_blank');
        });
        const paperBtn = document.getElementById('heroPaperBtn');
        if (paperBtn) paperBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // 打开征文投稿模态框
            showModalByContentKey("征文投稿", getModalContentById("callForPapers"));
        });
    }

    function renderWelcome() {
        const welcomeDiv = document.getElementById('welcomeContainer');
        welcomeDiv.innerHTML = `
            <div class="welcome-section">
                <h3><i class="fas fa-microphone-alt"></i> 欢迎辞</h3>
                <p>${MEETING_CONFIG.welcomeMessage}</p>
                <div style="margin-top:12px;font-size:0.9rem;color:#2c5282;">—— 深圳市分析测试协会：杨国武 执行会长</div>
            </div>
        `;
    }

    function renderCards() {
        const cardsContainer = document.getElementById('cardsContainer');
        cardsContainer.innerHTML = `<div class="cards-grid" id="dynamicCardsGrid"></div>`;
        const grid = document.getElementById('dynamicCardsGrid');
        MODULES.forEach(module => {
            const card = document.createElement('div');
            card.className = 'card';
            let iconHtml = `<div class="card-icon"><i class="${module.icon}"></i></div>`;
            let descText = '';
            if(module.type === 'link') {
                const url = module.urlKey === 'registrationUrl' ? MEETING_CONFIG.registrationUrl : (module.urlKey === 'photoLiveUrl' ? MEETING_CONFIG.photoLiveUrl : '#');
                descText = module.desc || (module.id === 'register' ? '点击跳转问卷星' : '点击跳转');
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(module.id === 'register') {
                        window.open(MEETING_CONFIG.registrationUrl, '_blank');
                    } else if(module.id === 'photoLive') {
                        window.open(MEETING_CONFIG.photoLiveUrl, '_blank');
                    } else {
                        // 其他链接类型 (预留)
                        window.open(url, '_blank');
                    }
                });
            } else {
                descText = '点击查看详情';
                card.addEventListener('click', () => {
                    const contentHtml = getModalContentById(module.contentKey);
                    let title = module.title;
                    if(module.id === 'briefSchedule') title = '简要日程';
                    else if(module.id === 'detailSchedule') title = '详细日程';
                    showModal(title, contentHtml);
                });
            }
            card.innerHTML = `${iconHtml}<h4>${module.title}</h4><p>${descText || '点击了解更多'}</p>`;
            grid.appendChild(card);
        });
    }

    function renderFooter() {
        const footerDiv = document.getElementById('footerContainer');
        footerDiv.innerHTML = `
            <div class="footer">
                <div class="footer-logo">© NCCBB ${MEETING_CONFIG.year} 第四届深圳国际安全健康测试技术学术会议暨2026年湾区科学仪器与实验室科技产业合作促进活动</div>
                <div style="font-size:0.8rem;">指导单位：深圳市科协 | 主办：深圳市分析测试协会</div>
                <div style="margin-top:0.5rem;font-size:0.75rem;">地址：观澜湖高尔夫度假酒店国际会议中心</div>
                <div style="margin-top:1rem;"><i class="far fa-envelope"></i> 会务邮箱：？  |  技术支持</div>
            </div>
        `;
    }

    // 模态框展示通用
    let currentModal = null;
    function showModal(title, contentHtml) {
        const modal = document.getElementById('globalModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        modalTitle.innerHTML = title;
        modalContent.innerHTML = contentHtml;
        modal.classList.add('active');
        currentModal = modal;
    }
    function closeModal() {
        if(currentModal) currentModal.classList.remove('active');
    }

    // 额外绑定模态框关闭
    function bindModalEvents() {
        const modal = document.getElementById('globalModal');
        const closeBtn = document.getElementById('closeModalBtn');
        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && modal.classList.contains('active')) closeModal();
        });
    }

    function showModalByContentKey(title, content) {
        showModal(title, content);
    }

    // 初始化所有
    function init() {
        setBackground();
        renderHero();
        renderWelcome();
        renderCards();
        renderFooter();
        bindModalEvents();
    }

    init();
</script>
