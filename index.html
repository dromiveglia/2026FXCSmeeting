    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f9ff;
            color: #1a2c3e;
            line-height: 1.5;
        }

        .page-wrapper {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f9 100%);
            transition: background-image 0.3s ease;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 顶部会议图片 */
        .top-banner-img {
            width: 100%;
            margin: 20px 0 0 0;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: #fff;
        }
        .top-banner-img img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* Hero 区域微调 (图片已含标题，可保留次要信息) */
        .hero {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 0 0 2rem 2rem;
            margin-top: 20px;
            padding: 1.8rem 2rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(66, 153, 225, 0.2);
        }
        .hero-badge {
            background: #1e4a76;
            color: white;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .hero h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b3b5f, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        @media (min-width: 768px) {
            .hero h1 { font-size: 2rem; }
        }
        .subtitle {
            font-size: 1rem;
            color: #2c5282;
            font-weight: 500;
            border-left: 4px solid #3182ce;
            padding-left: 1rem;
            margin: 0.5rem 0;
        }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef2ff;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            border: none;
        }
        .btn-primary {
            background: #2b6cb0;
            color: white;
            box-shadow: 0 4px 8px rgba(43,108,176,0.3);
        }
        .btn-primary:hover { background: #1e4a76; transform: translateY(-2px); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #2b6cb0;
            color: #2b6cb0;
        }
        .btn-outline:hover { background: #e6f0ff; }

        /* 欢迎辞 */
        .welcome-section {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem 1.8rem;
            margin: 2rem 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-left: 6px solid #3182ce;
        }
        .welcome-section h3 {
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
            color: #0f3b5c;
        }
        .welcome-section p {
            color: #2d3e50;
            line-height: 1.6;
        }

        /* 轮播模块 (滑动切换 图片/视频) */
        .carousel-wrapper {
            background: #fff;
            border-radius: 2rem;
            margin: 1.5rem 0 2rem;
            padding: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .carousel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e4a76;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
        }
        .carousel-container {
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
            background: #f0f4fa;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            will-change: transform;
        }
        .carousel-slide {
            flex: 0 0 100%;
            width: 100%;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef2ff;
        }
        .carousel-slide img, .carousel-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .carousel-btn.left { left: 12px; }
        .carousel-btn.right { right: 12px; }
        .carousel-btn:hover { background: rgba(0,0,0,0.7); }
        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #cbd5e0;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .dot.active {
            background: #2b6cb0;
            width: 24px;
            border-radius: 12px;
        }
        @media (max-width: 640px) {
            .carousel-btn { width: 32px; height: 32px; font-size: 1.2rem; }
        }

        /* 卡片网格 - 手机默认2列 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0 3rem;
        }
        /* 手机屏幕下强制2列，若屏幕极小可自适应 */
        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }
        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 1.2rem;
            padding: 1.2rem 0.8rem;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            border: 1px solid rgba(100,150,200,0.2);
            transition: all 0.2s;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .card-icon { font-size: 2rem; color: #2b6cb0; margin-bottom: 0.5rem; }
        .card h4 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; color: #1e3a5f; }
        .card p { font-size: 0.75rem; color: #4a627a; }

        /* 底部 */
        .footer {
            background: #0f2b3b;
            color: #cbd5e0;
            margin-top: 2rem;
            padding: 1.8rem 1rem;
            text-align: center;
            border-radius: 2rem 2rem 0 0;
            font-size: 0.8rem;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container {
            background: white;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.7rem;
            margin-bottom: 1rem;
        }
        .modal-header h3 { font-size: 1.3rem; color: #0f3b5c; }
        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            background: none;
            border: none;
            color: #718096;
        }
        .modal-body img {
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
        }
        .modal-body p, .modal-body div { line-height: 1.5; }
    </style>
</head>

    // 模块卡片配置
    const MODULES = [

        { id: "experts", title: "参会专家", icon: "fas fa-users", type: "modal", contentKey: "expertsList", imgKey: "expertsListImage" },
        { id: "briefSchedule", title: "简要日程", icon: "fas fa-calendar-week", type: "modal", contentKey: "briefSchedule", imgKey: "briefScheduleImage" },
        { id: "detailSchedule", title: "详细日程", icon: "fas fa-table-list", type: "modal", contentKey: "detailedSchedule", imgKey: "detailedScheduleImage" },
        { id: "register", title: "参会报名", icon: "fas fa-user-plus", type: "link", urlKey: "registrationUrl", desc: "填写问卷星报名" },
        { id: "regNotice", title: "注册须知", icon: "fas fa-clipboard-list", type: "modal", contentKey: "registrationNotice", imgKey: "registrationNoticeImage" },
        { id: "callPaper", title: "征文投稿", icon: "fas fa-file-alt", type: "modal", contentKey: "callForPapers", imgKey: "callForPapersImage" },
        { id: "subGuide", title: "投稿须知", icon: "fas fa-pen-ruler", type: "modal", contentKey: "submissionGuidelines", imgKey: "submissionGuidelinesImage" },
        { id: "photoLive", title: "照片直播", icon: "fas fa-camera", type: "link", urlKey: "photoLiveUrl", desc: "查看精彩瞬间" },
        { id: "support", title: "会议支持", icon: "fas fa-handshake", type: "modal", contentKey: "conferenceSupport", imgKey: "conferenceSupportImage" }
    ];

    // 获取模态内容（优先图片，若无则渲染文本）
    function getModalContentById(module) {
        const cfg = MEETING_CONFIG;
        const imgUrl = cfg[module.imgKey];
        if (imgUrl && imgUrl.trim() !== "") {
            return `<div style="text-align:center"><img src="${imgUrl}" alt="info" style="max-width:100%; border-radius:1rem;"></div>`;
        }
        // 无图片，渲染文字逻辑
        const key = module.contentKey;
        switch(key) {
            case "conferenceInfo": return `<p>${cfg.conferenceIntro}</p><br><strong>时间：</strong>${cfg.dates}<br><strong>地点：</strong>${cfg.location}<br><strong>主办：</strong>${cfg.organization.host}`;
            case "organization": return `<div><strong>指导单位：</strong>${cfg.organization.guidance}</div><br><div><strong>主办单位：</strong>${cfg.organization.host}</div><br><div><strong>组织单位：</strong>${cfg.organization.organizations}</div><br><div><strong>主赞助单位：</strong>${cfg.organization.sponsor}</div>`;
            case "expertsList": 
                let html = `<div style="display:grid;gap:12px;">`;
                cfg.expertsList.forEach(exp => { html += `<div style="background:#f1f5f9;padding:10px;border-radius:12px;"><strong>${exp.name}</strong><br>${exp.title}<br><span style="font-size:0.8rem;">${exp.field}</span></div>`; });
                html += `</div><p>更多专家持续更新</p>`;
                return html;
            case "briefSchedule": return `<p>${cfg.briefSchedule}</p>`;
            case "detailedSchedule": return cfg.detailedSchedule;
            case "registrationNotice": return `<p>${cfg.registrationNotice}</p><br><a href="${cfg.registrationUrl}" target="_blank" class="btn btn-primary" style="display:inline-block;">前往问卷星报名</a>`;
            case "callForPapers": return `<p>${cfg.callForPapers}</p>`;
            case "submissionGuidelines": return `<p>${cfg.submissionGuidelines}</p>`;
            case "conferenceSupport": return `<p>${cfg.conferenceSupport}</p>`;
            default: return "<p>信息更新中</p>";
        }
    }

    // 渲染顶部hero (简洁)
    function renderHero() {
        const heroDiv = document.getElementById('heroContainer');
        heroDiv.innerHTML = `
            <div class="hero">
                <div class="hero-badge">${MEETING_CONFIG.shortTitle}</div>
                <h1>${MEETING_CONFIG.fullTitle}</h1>
                <div class="subtitle">2026湾区科学仪器与实验室科技产业合作促进活动</div>
                <div class="info-row">
                    <div class="info-item"><i class="far fa-calendar-alt"></i> ${MEETING_CONFIG.dates}</div>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> ${MEETING_CONFIG.location}</div>
                </div>
                <div class="btn-group">
                    <a class="btn btn-primary" id="heroRegBtn"><i class="fas fa-clipboard-list"></i> 立即报名</a>
                    <a class="btn btn-outline" id="heroPaperBtn"><i class="fas fa-file-signature"></i> 征文投稿</a>
                </div>
            </div>
        `;
        document.getElementById('heroRegBtn')?.addEventListener('click', (e) => { e.preventDefault(); window.open(MEETING_CONFIG.registrationUrl, '_blank'); });
        document.getElementById('heroPaperBtn')?.addEventListener('click', (e) => { e.preventDefault(); showModalByModule(MODULES.find(m => m.id === 'callPaper')); });

    function renderWelcome() {
        document.getElementById('welcomeContainer').innerHTML = `
            <div class="welcome-section">
                <h3><i class="fas fa-microphone-alt"></i> 欢迎辞</h3>
                <p>${MEETING_CONFIG.welcomeMessage}</p>
                <div style="margin-top:12px;font-size:0.9rem;color:#2c5282;">—— 深圳市分析测试协会 杨国武 执行会长</div>
            </div>
        `;
    }

    // 轮播组件 (支持触摸滑动)
    let carouselIndex = 0;
    let track, slides, totalSlides;
    function buildCarousel() {
        const container = document.getElementById('carouselSection');
        const slidesData = MEETING_CONFIG.carouselSlides || [];
        if (slidesData.length === 0) {
            container.innerHTML = '<div class="carousel-wrapper"><div class="carousel-title"><i class="fas fa-images"></i> 往届精彩瞬间</div><div style="padding:2rem;text-align:center">即将更新</div></div>';
            return;
        }
        let slidesHtml = '';
        slidesData.forEach((item, idx) => {
            if (item.type === 'video') {
                slidesHtml += `<div class="carousel-slide"><video controls preload="metadata" src="${item.src}" poster=""></video></div>`;
            } else {
                slidesHtml += `<div class="carousel-slide"><img src="${item.src}" alt="slide ${idx}" loading="lazy"></div>`;
            }
        });
        const carouselHtml = `
            <div class="carousel-wrapper">
                <div class="carousel-title"><i class="fas fa-images"></i> 往届精彩影像集锦（左右滑动）</div>
                <div class="carousel-container">
                    <div class="carousel-track" id="carouselTrack">${slidesHtml}</div>
                    <button class="carousel-btn left" id="carouselPrev"><i class="fas fa-chevron-left"></i></button>
                    <button class="carousel-btn right" id="carouselNext"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="dots" id="carouselDots"></div>
            </div>
        `;
        container.innerHTML = carouselHtml;
        track = document.getElementById('carouselTrack');
        slides = document.querySelectorAll('.carousel-slide');
        totalSlides = slides.length;
        updateCarousel();
        // 按钮事件
        document.getElementById('carouselPrev')?.addEventListener('click', () => changeSlide(-1));
        document.getElementById('carouselNext')?.addEventListener('click', () => changeSlide(1));
        renderDots();
        // 触摸滑动支持
        let startX = 0;
        track.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
        track.addEventListener('touchend', (e) => {
            if (!startX) return;
            const endX = e.changedTouches[0].clientX;
            const diff = endX - startX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) changeSlide(-1);
                else changeSlide(1);
            }
            startX = 0;
        });
    }
    function updateCarousel() {
        if (!track) return;
        track.style.transform = `translateX(-${carouselIndex * 100}%)`;
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => { if(i === carouselIndex) dot.classList.add('active'); else dot.classList.remove('active'); });
    }
    function changeSlide(delta) {
        carouselIndex = (carouselIndex + delta + totalSlides) % totalSlides;
        updateCarousel();
    }
    function renderDots() {
        const dotsContainer = document.getElementById('carouselDots');
        if (!dotsContainer) return;
        dotsContainer.innerHTML = '';
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === carouselIndex) dot.classList.add('active');
            dot.addEventListener('click', () => { carouselIndex = i; updateCarousel(); });
            dotsContainer.appendChild(dot);
        }
    }

    // 卡片模块
    function renderCards() {
        const grid = document.getElementById('cardsContainer');
        grid.innerHTML = `<div class="cards-grid" id="dynamicCardsGrid"></div>`;
        const gridContainer = document.getElementById('dynamicCardsGrid');
        MODULES.forEach(module => {
            const card = document.createElement('div');
            card.className = 'card';
            let desc = module.type === 'link' ? (module.desc || '点击跳转') : '点击查看详情';
            card.innerHTML = `<div class="card-icon"><i class="${module.icon}"></i></div><h4>${module.title}</h4><p>${desc}</p>`;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (module.type === 'link') {
                    if (module.id === 'register') window.open(MEETING_CONFIG.registrationUrl, '_blank');
                    else if (module.id === 'photoLive') window.open(MEETING_CONFIG.photoLiveUrl, '_blank');
                } else {
                    showModalByModule(module);
                }
            });
            gridContainer.appendChild(card);
        });
    }

    function showModalByModule(module) {
        const content = getModalContentById(module);
        document.getElementById('modalTitle').innerText = module.title;
        document.getElementById('modalContent').innerHTML = content;
        document.getElementById('globalModal').classList.add('active');
    }

    function renderFooter() {
        document.getElementById('footerContainer').innerHTML = `
            <div class="footer">
                <div>© ${MEETING_CONFIG.year} 第四届深圳国际安全健康测试技术学术会议</div>
                <div style="margin-top:0.5rem;">指导：深圳市科协 | 主办：深圳市分析测试协会</div>
                <div style="margin-top:0.3rem;">地址：深圳观澜湖高尔夫度假酒店国际会议中心</div>
                <div style="margin-top:0.8rem;"><i class="far fa-envelope"></i> 会务邮箱：？</div>
            </div>
        `;
    }

    function setBackground() {
        if(MEETING_CONFIG.backgroundImage) document.querySelector('.page-wrapper').style.backgroundImage = MEETING_CONFIG.backgroundImage;
    }

    // 模态框控制
    function bindModal() {
        const modal = document.getElementById('globalModal');
        const close = document.getElementById('closeModalBtn');
        close.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active'); });
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && modal.classList.contains('active')) modal.classList.remove('active'); });
    }

    function init() {
        setBackground();
        renderHero();
        renderWelcome();
        buildCarousel();    // 轮播
        renderCards();
        renderFooter();
        bindModal();
    }
    init();
</script>
