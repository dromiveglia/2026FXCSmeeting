<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>第十二届全国计算生物学与生物信息学学术会议 | 2026东莞</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 使用思源黑体提升阅读体验 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f9ff;
            color: #1a2c3e;
            line-height: 1.5;
        }

        /* 动态背景：可通过js修改背景图，默认设置渐变+底纹 */
        .page-wrapper {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f9 100%);
            transition: background-image 0.3s ease;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 头部 Hero 区域 */
        .hero {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 0 0 2rem 2rem;
            margin-top: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(66, 153, 225, 0.2);
            transition: all 0.3s;
        }

        .hero-badge {
            background: #1e4a76;
            color: white;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b3b5f, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }

        .hero .subtitle {
            font-size: 1.1rem;
            color: #2c5282;
            font-weight: 500;
            border-left: 4px solid #3182ce;
            padding-left: 1rem;
            margin: 0.75rem 0;
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin: 1.5rem 0;
            color: #2d3748;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef2ff;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        .info-item i {
            color: #2b6cb0;
            width: 1.4rem;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.75rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
        }

        .btn-primary {
            background: #2b6cb0;
            color: white;
            box-shadow: 0 4px 8px rgba(43,108,176,0.3);
        }

        .btn-primary:hover {
            background: #1e4a76;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #2b6cb0;
            color: #2b6cb0;
        }

        .btn-outline:hover {
            background: #e6f0ff;
        }

        /* 欢迎辞区域 */
        .welcome-section {
            background: white;
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin: 2rem 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-left: 6px solid #3182ce;
        }

        .welcome-section h3 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            color: #0f3b5c;
        }

        .welcome-section p {
            color: #2d3e50;
            line-height: 1.6;
        }

        /* 网格卡片模块 (手机1列，电脑3~4列) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 3rem;
        }

        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(100, 150, 200, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -10px rgba(0, 80, 120, 0.2);
            border-color: #7f9fbf;
        }

        .card-icon {
            font-size: 2.5rem;
            color: #2b6cb0;
            margin-bottom: 0.8rem;
        }

        .card h4 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e3a5f;
        }

        .card p {
            font-size: 0.85rem;
            color: #4a627a;
        }

        /* 底部信息栏 */
        .footer {
            background: #0f2b3b;
            color: #cbd5e0;
            margin-top: 3rem;
            padding: 2rem 1rem;
            text-align: center;
            border-radius: 2rem 2rem 0 0;
        }

        .footer-logo {
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            color: #0f3b5c;
        }

        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            color: #718096;
            background: none;
            border: none;
            line-height: 1;
        }

        .modal-body {
            font-size: 0.95rem;
            color: #2d3748;
        }

        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .modal-body th, .modal-body td {
            border: 1px solid #cbd5e0;
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }

        .modal-body th {
            background: #eef2ff;
        }

        .org-list {
            padding-left: 1.2rem;
            margin: 0.6rem 0;
        }

        @media (max-width: 640px) {
            .container {
                padding: 0 16px;
            }
            .hero {
                padding: 1.8rem 1.2rem;
            }
            .hero h1 {
                font-size: 1.6rem;
            }
            .btn-group {
                justify-content: center;
            }
            .welcome-section {
                padding: 1.2rem;
            }
            .card h4 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper" id="app">
    <div class="container">
        <!-- 动态头部会由js渲染，但为了避免闪烁，先设置骨架 -->
        <div id="heroContainer"></div>
        <!-- 欢迎辞区域 -->
        <div id="welcomeContainer"></div>
        <!-- 卡片网格区 -->
        <div id="cardsContainer"></div>
    </div>
    <div id="footerContainer"></div>
</div>

<!-- 模态框结构 -->
<div id="globalModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle">标题</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalContent">
            内容加载中...
        </div>
    </div>
</div>

<script>
    // ======================== 每年一键替换配置 START =========================
    // 2026 年度会议信息配置 (次年直接修改此对象即可，背景/标题/日程均可更新)
    const MEETING_CONFIG = {
        year: "2026",
        fullTitle: "第十二届全国计算生物学与生物信息学学术会议<br>暨人工智能驱动生物医学融合创新大会",
        shortTitle: "NCCBB2026 · 人工智能驱动生物医学融合创新",
        dates: "2026年5月22-24日",
        location: "中国 · 广东 东莞",
        // 背景图片 (可置空或填写网络图片地址，若为空则保留css渐变)
        backgroundImage: "",   // 例如: "url('https://example.com/bg2026.jpg')" 或留空
        // 欢迎辞(可每年修改)
        welcomeMessage: "尊敬的各位专家、学者：<br>热烈欢迎参加第十二届全国计算生物学与生物信息学学术会议（NCCBB2026）！本届大会以“人工智能驱动生物医学融合创新”为主题，汇聚全国生物信息学、计算生物学、智慧药学与临床医学领域的顶尖智慧。东莞作为大湾区科创明珠，热情期待您的到来，共同探索生命数据新前沿。",
        // 问卷星报名链接 (每年可替换)
        registrationUrl: "https://www.wjx.top/vm/h4I7gXx.aspx",  // 示例问卷星链接，实际主办方可更换
        // 照片直播外链
        photoLiveUrl: "https://www.photolive.com/event/nccbb2026", 
        // 会议信息文本 (用于会议信息卡片)
        conferenceIntro: "全国计算生物学与生物信息学学术会议（NCCBB）是中国生物工程学会计算生物学与生物信息学专业委员会主办的年度旗舰会议。本届大会设置12个专题论坛，涵盖单细胞组学、AI药物设计、医学大数据挖掘等热点，邀请院士及杰青等50余位知名学者作报告。",
        // 简要日程 (可每年换内容)
        briefSchedule: "<strong>5月22日</strong> 全天注册报到，会前卫星论坛<br><strong>5月23日</strong> 开幕式+主旨报告+分会场一/二<br><strong>5月24日</strong> 青年学者论坛+优秀论文颁奖+闭幕式",
        // 详细日程 (结构化表格HTML)
        detailedSchedule: `<table>
            <tr><th>时间</th><th>活动内容</th><th>地点</th></tr>
            <tr><td>5月22日 09:00-20:00</td><td>注册报到、领取资料</td><td>东莞迎宾馆大堂</td></tr>
            <tr><td>5月23日 08:30-09:00</td><td>开幕式 & 领导致辞</td><td>主会议厅</td></tr>
            <tr><td>5月23日 09:00-12:00</td><td>主旨报告 (陈润生院士、张泽民教授等)</td><td>主会议厅</td></tr>
            <tr><td>5月23日 13:30-17:30</td><td>分会场: AI药物筛选 / 单细胞时空组学 / 医学影像智能分析</td><td>平行分会场</td></tr>
            <tr><td>5月24日 08:30-11:30</td><td>青年学者论坛 & 口头报告</td><td>会议中心B厅</td></tr>
            <tr><td>5月24日 13:30-16:00</td><td>优秀墙报评比 & 闭幕式颁奖</td><td>主会议厅</td></tr>
            </table>`,
        // 组织架构
        organization: {
            guidance: "中国生物工程学会",
            host: "中国生物工程学会计算生物学与生物信息学专业委员会、广东医科大学、东莞市科学技术协会",
            organizers: "广东医科大学科学技术部、广东医科大学东莞创新研究院、广东医科大学药学院、广东医科大学研究生院",
            co_organizers: "广东省高性能计算学会、广东医科大学生物医学工程学院、广东医科大学医学技术学院、广东医科大学附属东莞第一医院、广东省大数据挖掘和精准药物设计创新团队、东莞市计算机辅助药物设计重点实验室"
        },
        // 参会专家示例（可每年更新）
        expertsList: [
            { name: "陈润生 院士", title: "中国科学院", field: "生物信息学" },
            { name: "张泽民 教授", title: "北京大学", field: "单细胞基因组学" },
            { name: "李霞 教授", title: "哈尔滨医科大学", field: "生物医学大数据" },
            { name: "王光中 研究员", title: "中科院上海营养所", field: "计算生物学" },
            { name: "张健 教授", title: "上海交通大学", field: "AI药物设计" },
            { name: "赵屹 研究员", title: "中科院计算所", field: "医学人工智能" }
        ],
        // 注册须知文本
        registrationNotice: "1. 早鸟注册截止2026年4月20日；常规注册2026年5月10日截止。<br>2. 注册费：正式代表1800元，学生代表1200元（凭学生证）。<br>3. 包含会议资料、茶歇、午宴，住宿交通自理。<br>4. 请通过上方【活动报名】按钮跳转问卷星填写信息并缴费。",
        // 征文投稿要求
        callForPapers: "征文范围：计算生物学、生物信息学、AI医学、药物设计等未发表成果。摘要截止2026年4月1日，全文投稿截止4月15日。优秀论文推荐至《Briefings in Bioinformatics》等期刊。投稿邮箱：nccbb2026@ biomed.com (或通过官网投稿系统)。",
        // 投稿须知补充
        submissionGuidelines: "1. 摘要500字以内，全文不超过6000字。2. 请使用大会模板（可在官网下载）。3. 所有投稿将经过同行评审，录用通知于2026年4月25日发出。4. 优秀口头报告及墙报设立奖项。",
        // 会议支持/鸣谢
        conferenceSupport: "特别致谢：广东省自然科学基金委员会、广东省科技厅、广东省教育厅、广东省卫生健康委、广东省中医药管理局、广东省科学院以及华为技术有限公司、华大基因、东莞生物医药创新研究院等单位的支持。"
    };

    // 模块配置 (每个卡片独立跳转/弹窗信息)
    // type: 'modal' 展示模态框(内容从下方contentMap获取或自定义), 'link' 直接跳转外链
    // 报名参会卡片单独跳转问卷星, 照片直播跳转外链
    const MODULES = [
        { id: "confInfo", title: "会议信息", icon: "fas fa-info-circle", type: "modal", contentKey: "conferenceInfo" },
        { id: "org", title: "组织架构", icon: "fas fa-building", type: "modal", contentKey: "organization" },
        { id: "experts", title: "参会专家", icon: "fas fa-users", type: "modal", contentKey: "expertsList" },
        { id: "briefSchedule", title: "简要日程", icon: "fas fa-calendar-week", type: "modal", contentKey: "briefSchedule" },
        { id: "detailSchedule", title: "详细日程", icon: "fas fa-table-list", type: "modal", contentKey: "detailedSchedule" },
        { id: "register", title: "报名参会", icon: "fas fa-user-plus", type: "link", urlKey: "registrationUrl", desc: "填写问卷星报名" },
        { id: "regNotice", title: "注册须知", icon: "fas fa-clipboard-list", type: "modal", contentKey: "registrationNotice" },
        { id: "callPaper", title: "征文投稿", icon: "fas fa-file-alt", type: "modal", contentKey: "callForPapers" },
        { id: "subGuide", title: "投稿须知", icon: "fas fa-pen-ruler", type: "modal", contentKey: "submissionGuidelines" },
        { id: "photoLive", title: "照片直播", icon: "fas fa-camera", type: "link", urlKey: "photoLiveUrl", desc: "查看现场精彩瞬间" },
        { id: "support", title: "会议支持", icon: "fas fa-handshake", type: "modal", contentKey: "conferenceSupport" }
    ];

    // 内容映射：用于modal卡片展示的具体内容 (HTML字符串)
    function getModalContentById(key) {
        const cfg = MEETING_CONFIG;
        switch(key) {
            case "conferenceInfo":
                return `<p>${cfg.conferenceIntro}</p><br><strong>会议时间：</strong>${cfg.dates}<br><strong>地点：</strong>${cfg.location}<br><strong>主办单位：</strong>${cfg.organization.host}<br><strong>预计规模：</strong>800+参会者，涵盖国内外顶尖高校及科研机构。`;
            case "organization":
                return `<div><strong>指导单位：</strong>${cfg.organization.guidance}</div><br>
                        <div><strong>主办单位：</strong>${cfg.organization.host}</div><br>
                        <div><strong>承办单位：</strong>${cfg.organization.organizers}</div><br>
                        <div><strong>协办单位：</strong>${cfg.organization.co_organizers}</div><br>
                        <div><strong>支持机构：</strong>广东省高性能计算学会，东莞市科学技术协会等</div>`;
            case "expertsList":
                let expertHtml = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">`;
                cfg.expertsList.forEach(exp => {
                    expertHtml += `<div style="background:#f1f5f9;border-radius:16px;padding:10px;"><i class="fas fa-user-circle"></i> <strong>${exp.name}</strong><br>${exp.title}<br><span style="font-size:0.8rem;">${exp.field}</span></div>`;
                });
                expertHtml += `</div><p style="margin-top:15px;">更多特邀嘉宾持续更新中，欢迎关注会议官网。</p>`;
                return expertHtml;
            case "briefSchedule":
                return `<p>${cfg.briefSchedule}</p><br><p>详细日程请点击「详细日程」卡片，以现场手册为准。</p>`;
            case "detailedSchedule":
                return `${cfg.detailedSchedule}<p class="mt-2" style="margin-top:12px;">※ 实际议程请以会议当天公布为准。</p>`;
            case "registrationNotice":
                return `<p>${cfg.registrationNotice}</p><br><a href="${cfg.registrationUrl}" target="_blank" class="btn btn-primary" style="display:inline-block;">前往问卷星报名</a>`;
            case "callForPapers":
                return `<p>${cfg.callForPapers}</p><br><i class="fas fa-envelope"></i> 投稿咨询：nccbb2026@dmu.edu.cn<br>重要日期提醒：摘要截止2026年4月1日。`;
            case "submissionGuidelines":
                return `<p>${cfg.submissionGuidelines}</p><br><strong>模板下载：</strong> 大会官网提供Word/LaTex模板。`;
            case "conferenceSupport":
                return `<p>${cfg.conferenceSupport}</p><br><i class="fas fa-heart" style="color:#e53e3e;"></i> 诚挚感谢所有支持单位及志愿者团队！`;
            default:
                return "<p>信息更新中，敬请期待。</p>";
        }
    }

    // ======================== 页面动态渲染 ========================
    function setBackground() {
        const pageWrapper = document.querySelector('.page-wrapper');
        if (MEETING_CONFIG.backgroundImage && MEETING_CONFIG.backgroundImage.trim() !== "") {
            pageWrapper.style.backgroundImage = MEETING_CONFIG.backgroundImage;
            pageWrapper.style.backgroundSize = "cover";
            pageWrapper.style.backgroundAttachment = "fixed";
            pageWrapper.style.backgroundPosition = "center";
        } else {
            pageWrapper.style.background = "linear-gradient(135deg, #f8fafc 0%, #eef2f9 100%)";
        }
    }

    function renderHero() {
        const heroContainer = document.getElementById('heroContainer');
        heroContainer.innerHTML = `
            <div class="hero">
                <div class="hero-badge">${MEETING_CONFIG.shortTitle}</div>
                <h1>${MEETING_CONFIG.fullTitle}</h1>
                <div class="subtitle">人工智能驱动生物医学融合创新大会</div>
                <div class="info-row">
                    <div class="info-item"><i class="far fa-calendar-alt"></i> ${MEETING_CONFIG.dates}</div>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> ${MEETING_CONFIG.location}</div>
                </div>
                <div class="btn-group">
                    <a class="btn btn-primary" id="heroRegBtn"><i class="fas fa-clipboard-list"></i> 立即报名</a>
                    <a class="btn btn-outline" id="heroPaperBtn"><i class="fas fa-file-signature"></i> 征文投稿</a>
                </div>
            </div>
        `;
        // 绑定头部按钮事件
        const regBtn = document.getElementById('heroRegBtn');
        if (regBtn) regBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.open(MEETING_CONFIG.registrationUrl, '_blank');
        });
        const paperBtn = document.getElementById('heroPaperBtn');
        if (paperBtn) paperBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // 打开征文投稿模态框
            showModalByContentKey("征文投稿", getModalContentById("callForPapers"));
        });
    }

    function renderWelcome() {
        const welcomeDiv = document.getElementById('welcomeContainer');
        welcomeDiv.innerHTML = `
            <div class="welcome-section">
                <h3><i class="fas fa-microphone-alt"></i> 欢迎辞</h3>
                <p>${MEETING_CONFIG.welcomeMessage}</p>
                <div style="margin-top:12px;font-size:0.9rem;color:#2c5282;">—— 大会主席：陈洛南 教授、徐鹰 教授</div>
            </div>
        `;
    }

    function renderCards() {
        const cardsContainer = document.getElementById('cardsContainer');
        cardsContainer.innerHTML = `<div class="cards-grid" id="dynamicCardsGrid"></div>`;
        const grid = document.getElementById('dynamicCardsGrid');
        MODULES.forEach(module => {
            const card = document.createElement('div');
            card.className = 'card';
            let iconHtml = `<div class="card-icon"><i class="${module.icon}"></i></div>`;
            let descText = '';
            if(module.type === 'link') {
                const url = module.urlKey === 'registrationUrl' ? MEETING_CONFIG.registrationUrl : (module.urlKey === 'photoLiveUrl' ? MEETING_CONFIG.photoLiveUrl : '#');
                descText = module.desc || (module.id === 'register' ? '点击跳转问卷星' : '点击跳转');
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(module.id === 'register') {
                        window.open(MEETING_CONFIG.registrationUrl, '_blank');
                    } else if(module.id === 'photoLive') {
                        window.open(MEETING_CONFIG.photoLiveUrl, '_blank');
                    } else {
                        // 其他链接类型 (预留)
                        window.open(url, '_blank');
                    }
                });
            } else {
                descText = '点击查看详情';
                card.addEventListener('click', () => {
                    const contentHtml = getModalContentById(module.contentKey);
                    let title = module.title;
                    if(module.id === 'briefSchedule') title = '简要日程';
                    else if(module.id === 'detailSchedule') title = '详细日程';
                    showModal(title, contentHtml);
                });
            }
            card.innerHTML = `${iconHtml}<h4>${module.title}</h4><p>${descText || '点击了解更多'}</p>`;
            grid.appendChild(card);
        });
    }

    function renderFooter() {
        const footerDiv = document.getElementById('footerContainer');
        footerDiv.innerHTML = `
            <div class="footer">
                <div class="footer-logo">© NCCBB ${MEETING_CONFIG.year} 第十二届全国计算生物学与生物信息学学术会议</div>
                <div style="font-size:0.8rem;">指导单位：中国生物工程学会 | 主办：广东医科大学、东莞市科学技术协会、专委会</div>
                <div style="margin-top:0.5rem;font-size:0.75rem;">地址：广东省东莞市松山湖科技产业园区 · 广东医科大学东莞校区</div>
                <div style="margin-top:1rem;"><i class="far fa-envelope"></i> 会务邮箱：nccbb2026@gdmu.edu.cn  |  技术支持</div>
            </div>
        `;
    }

    // 模态框展示通用
    let currentModal = null;
    function showModal(title, contentHtml) {
        const modal = document.getElementById('globalModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        modalTitle.innerHTML = title;
        modalContent.innerHTML = contentHtml;
        modal.classList.add('active');
        currentModal = modal;
    }
    function closeModal() {
        if(currentModal) currentModal.classList.remove('active');
    }

    // 额外绑定模态框关闭
    function bindModalEvents() {
        const modal = document.getElementById('globalModal');
        const closeBtn = document.getElementById('closeModalBtn');
        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && modal.classList.contains('active')) closeModal();
        });
    }

    function showModalByContentKey(title, content) {
        showModal(title, content);
    }

    // 初始化所有
    function init() {
        setBackground();
        renderHero();
        renderWelcome();
        renderCards();
        renderFooter();
        bindModalEvents();
    }

    init();
</script>
</body>
</html>
